# ---- PostgreSQL (valores por defecto para desarrollo; sobreescribibles por entorno) ----
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/membresias}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:Liayan686}
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# ---- schema.sql en el arranque ----
spring.sql.init.mode=always

# ---- Auto-renovacion ----
membership.auto-renewal.cron=0 0 * * * *

# ---- Moderacion comunidad ----
community.moderation.banned-words=spam,scam,abuse,phishing

# ---- WebSocket / JWT ----
# El secreto se toma de la variable de entorno JWT_SECRET; el valor por defecto es solo para desarrollo.
security.jwt.secret=${JWT_SECRET:dev-secret-please-change-this-to-a-long-random-256bit-value!!}
security.jwt.ttl-ms=${JWT_TTL_MS:3600000}
security.jwt.dev-token-enabled=${JWT_DEV_TOKEN_ENABLED:true}

