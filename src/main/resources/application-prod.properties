# Perfil de producción: activar con  --spring.profiles.active=prod
#
# Los secretos son OBLIGATORIOS por entorno (sin valor por defecto): si faltan,
# la aplicación falla al arrancar (comportamiento deseado en producción).

# JWT: secreto obligatorio (>= 32 bytes) y endpoint de dev-token DESACTIVADO.
security.jwt.secret=${JWT_SECRET}
security.jwt.dev-token-enabled=false

# Base de datos: credenciales obligatorias por entorno.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# El esquema se gestiona con migraciones externas, no en el arranque.
spring.sql.init.mode=never
